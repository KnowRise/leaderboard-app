name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  EB_APP_NAME: LKS-Leaderboard-App
  EB_ENV_NAME: LKS-Leaderboard-Env
  S3_BUCKET: elasticbeanstalk-us-east-1-851382689048   # GANTI dengan bucket Beanstalk Anda

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate deployment version
      id: version
      run: |
        DEPLOY_ID=$(date +%Y%m%d%H%M%S)
        echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
        echo "version_label=v-$DEPLOY_ID" >> "$GITHUB_OUTPUT"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create deployment package
      run: |
        zip -r deploy.zip . -x "*.git*" ".github/*" "*.env*" "*.pem*" ".gitignore"

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Upload to S3
      run: |
        aws s3 cp deploy.zip s3://${{ env.S3_BUCKET }}/deploy-${{ steps.version.outputs.deploy_id }}.zip

    - name: Create application version
      run: |
        aws elasticbeanstalk create-application-version \
          --application-name ${{ env.EB_APP_NAME }} \
          --version-label ${{ steps.version.outputs.version_label }} \
          --source-bundle S3Bucket=${{ env.S3_BUCKET }},S3Key=deploy-${{ steps.version.outputs.deploy_id }}.zip

    - name: Update environment
      run: |
        aws elasticbeanstalk update-environment \
          --environment-name ${{ env.EB_ENV_NAME }} \
          --version-label ${{ steps.version.outputs.version_label }}